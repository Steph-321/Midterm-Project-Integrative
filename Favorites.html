<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Comment Cards</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <div class="card">
            <div class="image-box">
                <img src="images/bg1.jpg" alt="">
                <div class="heart" onclick="toggleLike(this)">
                    <img src="images/icon.png" class="heart-img" data-liked="false">
                </div>
            </div>

            <p class="title">Comment Section</p>

            <ul class="comments-list"></ul>
            <input type="text" class="comment-input" placeholder="Add a comment...">
            <button onclick="addcomment(this)">Post</button>
        </div>


        <div class="card">
            <div class="image-box">
                <img src="images/bg2.jpg" alt="">
                <div class="heart" onclick="toggleLike(this)">
                    <img src="images/icon.png" class="heart-img" data-liked="false">
                </div>
            </div>

            <p class="title">Comment Section</p>
            <ul class="comments-list"></ul>
            <input type="text" class="comment-input" placeholder="Add a comment...">
            <button onclick="addcomment(this)">Post</button>
        </div>


        <div class="card">
            <div class="image-box">
                <img src="images/bg3.png" alt="">
                <div class="heart" onclick="toggleLike(this)">
                    <img src="images/icon.png" class="heart-img" data-liked="false">
                </div>
            </div>

            <p class="title">Comment Section</p>

            <ul class="comments-list"></ul>

            <input type="text" class="comment-input" placeholder="Add a comment...">

            <button onclick="addcomment(this)">Post</button>
        </div>


        <div class="card">
            <div class="image-box">
                <img src="images/bg4.jpg" alt="">
                <div class="heart" onclick="toggleLike(this)">
                    <img src="images/icon.png" class="heart-img" data-liked="false">
                </div>
            </div>

            <p class="title">Comment Section</p>
            
            <ul class="comments-list"></ul>

            <input type="text" class="comment-input" placeholder="Add a comment...">

            <button onclick="addcomment(this)">Post</button>
        </div>
    </div>
<script src="fav.js"></script>
</body>
</html>
